<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found - CultureHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"/>
  </head>

  <body>
    <div class="custom-bg text-dark">
      <div class="d-flex align-items-center justify-content-center min-vh-100 px-2">
        <div class="text-center">
          <h1 class="display-1 fw-bold">404</h1>
          <p class="fs-2 fw-medium mt-4">Oops! Page not found</p>
          <p class="mt-4 mb-5"> The page you're looking for doesn't exist or has been moved. </p>
          <a href="/" class="btn btn-light fw-semibold rounded-pill px-4 py-2 custom-btn">
            Go Home
          </a>
        </div>
      </div>
    </div>

    <!-- Temporary inline styles for the 404 page. In a production app, these would ideally be moved to a separate CSS file. -->
    <style>
      .custom-bg {
        background: linear-gradient(to right, #f5d3d4, #e5e7eb);
      }

      .custom-btn:hover {
        background-color: #f3e8ff !important;
        transition: background-color 0.3s ease-in-out;
      }

      @media (prefers-color-scheme: dark) {
        .custom-bg {
          background: linear-gradient(to right, #1f2937, #111827);
          color: white !important;
        }

        .custom-btn {
          background-color: #374151 !important;
          color: white !important;
        }

        .custom-btn:hover {
          background-color: #4b5563 !important;
        }
      }
    </style>

  </body>
</html>
