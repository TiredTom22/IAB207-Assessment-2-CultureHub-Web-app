<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found – CultureHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #FFEEE6;
      color: #1A0800;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .error-wrap { text-align: center; padding: 2rem; }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      color: #FF4F00;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .error-icon {
      font-size: 3rem;
      color: #FF4F00;
      opacity: 0.5;
      margin-bottom: 1.5rem;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #471700;
      margin-bottom: 0.75rem;
    }
    .error-msg {
      color: #8B4A2B;
      font-size: 1rem;
      max-width: 420px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }
    .btn-home {
      display: inline-block;
      background: #FF4F00;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 13px 36px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-home:hover {
      background: #C13D00;
      color: #fff;
      transform: translateY(-2px);
    }
    .divider {
      width: 60px;
      height: 3px;
      background: #FF4F00;
      border-radius: 2px;
      margin: 1rem auto 1.5rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <div class="divider"></div>
    <div class="error-icon"><i class="bi bi-compass"></i></div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-msg">
      Looks like this page wandered off the map. The page you're looking for
      doesn't exist or may have been moved.
    </p>
    <a href="/" class="btn-home">Back to CultureHub</a>
  </div>
</body>
</html>
